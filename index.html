header h1{color:#FFD700;margin:0;font-size:28px}
.controls{display:flex;gap:10px;padding:15px;background:#111;position:sticky;top:0;z-index:10}
.controls input,.controls select{flex:1;padding:10px;border:1px solid #FFD700;background:#222;color:#fff;border-radius:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:15px;padding:15px}
.card{background:#1a1a1a;border:1px solid #333;border-radius:12px;overflow:hidden;transition:.2s}
.card:hover{border-color:#FFD700}
.card img{width:100%;height:180px;object-fit:cover;background:#222}
.card-body{padding:12px}
.card h3{margin:0 0 5px;font-size:14px;color:#FFD700}
.card p{margin:0 0 10px;font-size:13px;color:#aaa}
.price{font-weight:bold;color:#fff;font-size:16px}
.btn{display:block;text-align:center;background:#FFD700;color:#000;padding:10px;border-radius:8px;text-decoration:none;font-weight:bold;margin-top:8px}
</style>

function render(list){
document.getElementById('grid').innerHTML = list.map(p=>`
<div class="card">
<img src="${p.img}" alt="${p.name}">
<div class="card-body">
<h3>${p.name}</h3><p class="price">₦${p.price.toLocaleString()}</p>
<a class="btn" href="https://wa.me/${WHATSAPP}?text=Hi%20Golden%20Fire%20Galaxy%20I%20want%20to%20order:%20${encodeURIComponent(p.name)}%20for%20₦${p.price}">Order on WhatsApp</a>
</div></div>`).join('');
}

function filter(){
let s=document.getElementById('search').value.toLowerCase();
let f=document.getElementById('filter').value.split('-');
let list=products.filter(p=>p.name.toLowerCase().includes(s));
if(f[0])list=list.filter(p=>p.price>=+f[0]&&p.price<=+f[1]);
render(list);
}
document.getElementById('search').oninput=filter;
document.getElementById('filter').onchange=filter;
render(products);
</script>
